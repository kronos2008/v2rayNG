name: Build APK + libs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Clone v2rayNG
      run: git clone https://github.com/2dust/v2rayNG.git

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Gradle
      run: sudo apt-get update && sudo apt-get install -y gradle

    # 👉 скачиваем либы отдельно
    - name: Download libv2ray
      run: |
        mkdir -p output_libs/arm64-v8a
        mkdir -p output_libs/armeabi-v7a

        curl -L -o output_libs/arm64-v8a/libv2ray.so \
          https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_arm64-v8a.so

        curl -L -o output_libs/armeabi-v7a/libv2ray.so \
          https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_armeabi-v7a.so

    # 👉 билд (ВАЖНО: через :app)
    - name: Build APK
      run: |
        cd v2rayNG
        gradle :app:assembleDebug

    # 👉 выгрузка APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: v2rayNG/app/build/outputs/apk/debug/*.apk

    # 👉 выгрузка либ
    - name: Upload libv2ray
      uses: actions/upload-artifact@v4
      with:
        name: libv2ray
        path: output_libs/
