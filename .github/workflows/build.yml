name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Клонируем репозиторий
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📦 Делаем папки под .so
      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

      # 🔥 Скачиваем V2Ray core
      - name: Download libv2ray
        run: |
          curl -L -o app/src/main/jniLibs/arm64-v8a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_arm64-v8a.so
          curl -L -o app/src/main/jniLibs/armeabi-v7a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_armeabi-v7a.so

      # ✅ Проверяем что либы есть
      - name: Verify libs
        run: |
          echo "==== CHECK jniLibs ===="
          ls -R app/src/main/jniLibs

      # 🔧 Ограничиваем ABI (чтобы APK не был 300МБ)
      - name: Set ABI filters
        run: |
          sed -i '/defaultConfig {/a \        ndk { abiFilters "armeabi-v7a", "arm64-v8a" }' app/build.gradle || true

      # ⚙️ Даем права на gradlew
      - name: Grant execute permission
        run: chmod +x gradlew

      # 🏗️ Сборка APK
      - name: Build APK
        run: ./gradlew assembleDebug

      # 📤 Загружаем APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
