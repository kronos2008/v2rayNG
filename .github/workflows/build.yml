name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    # 🔥 libv2ray
    - name: Download libv2ray
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a

        curl -L -o app/src/main/jniLibs/arm64-v8a/libv2ray.so \
        https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_arm64-v8a.so

        curl -L -o app/src/main/jniLibs/armeabi-v7a/libv2ray.so \
        https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_armeabi-v7a.so

    - name: Verify libs
      run: ls -R app/src/main/jniLibs

    # 🔥 теперь gradlew есть
    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/debug/*.apk
