name: Android Build

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Клонируем
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ⚙️ Gradle
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # 🔍 Найдём где реально проект
      - name: Find project dir
        id: finddir
        run: |
          DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "DIR=$DIR" >> $GITHUB_OUTPUT
          echo "Project dir: $DIR"

      # 📦 jniLibs
      - name: Prepare jniLibs
        run: |
          mkdir -p ${{ steps.finddir.outputs.DIR }}/app/src/main/jniLibs/arm64-v8a
          mkdir -p ${{ steps.finddir.outputs.DIR }}/app/src/main/jniLibs/armeabi-v7a

      # 🔥 core
      - name: Download libv2ray
        run: |
          curl -L -o ${{ steps.finddir.outputs.DIR }}/app/src/main/jniLibs/arm64-v8a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_arm64-v8a.so
          curl -L -o ${{ steps.finddir.outputs.DIR }}/app/src/main/jniLibs/armeabi-v7a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_armeabi-v7a.so

      # 🔍 Проверка
      - name: Verify libs
        run: ls -R ${{ steps.finddir.outputs.DIR }}/app/src/main/jniLibs

      # 🏗️ СБОРКА (без угадываний пути)
      - name: Build APK
        run: |
          cd ${{ steps.finddir.outputs.DIR }}
          gradle assembleDebug

      # 📤 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            **/build/outputs/apk/debug/*.apk
