name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔥 Скачиваем V2Ray core
      - name: Download libv2ray
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

          # 64-bit
          curl -L -o libv2ray-arm64.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_arm64-v8a.so
          
          # 32-bit
          curl -L -o libv2ray-arm32.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_armeabi-v7a.so

          mv libv2ray-arm64.so app/src/main/jniLibs/arm64-v8a/libv2ray.so
          mv libv2ray-arm32.so app/src/main/jniLibs/armeabi-v7a/libv2ray.so

      # 🔧 Ограничиваем ABI (чтобы не было лишних 300МБ)
      - name: Patch Gradle ABI filters
        run: |
          sed -i '/ndk {/a \        abiFilters "armeabi-v7a", "arm64-v8a"' app/build.gradle || true

      # 📦 Сборка
      - name: Build APK
        run: ./gradlew assembleDebug

      # 📤 Загрузка APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
