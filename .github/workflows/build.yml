name: Android Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ⚙️ Устанавливаем Gradle
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # 📦 jniLibs
      - name: Prepare jniLibs
        run: |
          mkdir -p v2rayNG/app/src/main/jniLibs/arm64-v8a
          mkdir -p v2rayNG/app/src/main/jniLibs/armeabi-v7a

      # 🔥 core
      - name: Download libv2ray
        run: |
          curl -L -o v2rayNG/app/src/main/jniLibs/arm64-v8a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_arm64-v8a.so
          curl -L -o v2rayNG/app/src/main/jniLibs/armeabi-v7a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_armeabi-v7a.so

      # 🔍 проверка
      - name: Verify libs
        run: ls -R v2rayNG/app/src/main/jniLibs

      # 🏗️ Сборка БЕЗ gradlew
      - name: Build APK
        run: gradle :v2rayNG:assembleDebug

      # 📤 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: v2rayNG/app/build/outputs/apk/debug/app-debug.apk
