name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build libv2ray.aar from submodule
        run: |
          cd AndroidLibXrayLite
          go mod download
          gomobile bind -v -androidapi 21 -ldflags="-w -s" -target=android ./
          cp libv2ray.aar ../V2rayNG/app/libs/libv2ray.aar

      - name: Build Debug APK
        working-directory: V2rayNG
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: true-vpn-debug
          path: V2rayNG/app/build/outputs/apk/**/*.apk
