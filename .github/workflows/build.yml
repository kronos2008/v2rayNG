name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔥 Переходим в папку проекта
      - name: Enter project folder
        run: cd v2rayNG-master

      # 📦 Создаём jniLibs
      - name: Prepare jniLibs
        run: |
          mkdir -p v2rayNG-master/app/src/main/jniLibs/arm64-v8a
          mkdir -p v2rayNG-master/app/src/main/jniLibs/armeabi-v7a

      # 🔽 Скачиваем core
      - name: Download libv2ray
        run: |
          curl -L -o v2rayNG-master/app/src/main/jniLibs/arm64-v8a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_arm64-v8a.so
          curl -L -o v2rayNG-master/app/src/main/jniLibs/armeabi-v7a/libv2ray.so https://github.com/v2fly/v2ray-core/releases/latest/download/android_armeabi-v7a.so

      # 🔍 Проверка
      - name: Verify libs
        run: ls -R v2rayNG-master/app/src/main/jniLibs

      # ⚙️ Делаем gradlew исполняемым
      - name: Make gradlew executable
        run: chmod +x v2rayNG-master/gradlew

      # 🏗️ Сборка
      - name: Build APK
        run: |
          cd v2rayNG-master
          ./gradlew assembleDebug

      # 📤 Отдаём APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: v2rayNG-master/app/build/outputs/apk/debug/app-debug.apk
