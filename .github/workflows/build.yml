name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # ✅ СКАЧИВАЕМ НОРМАЛЬНЫЙ libv2ray (совместимый)
      - name: Download libv2ray
        run: |
          mkdir -p v2rayNG/app/src/main/jniLibs/arm64-v8a
          mkdir -p v2rayNG/app/src/main/jniLibs/armeabi-v7a

          curl -L -o v2rayNG/app/src/main/jniLibs/arm64-v8a/libv2ray.so \
            https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_arm64-v8a.so

          curl -L -o v2rayNG/app/src/main/jniLibs/armeabi-v7a/libv2ray.so \
            https://github.com/2dust/v2rayNG/releases/download/1.8.5/libv2ray_armeabi-v7a.so

      # ✅ ПРОВЕРКА (можешь потом удалить)
      - name: Verify libs
        run: ls -R v2rayNG/app/src/main/jniLibs

      # ✅ ДЕЛАЕМ gradlew исполняемым
      - name: Make gradlew executable
        run: chmod +x v2rayNG/gradlew

      # ✅ СБОРКА (ВАЖНО: через cd)
      - name: Build APK
        run: |
          cd v2rayNG
          ./gradlew assembleDebug

      # ✅ ЗАГРУЗКА APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-apk
          path: v2rayNG/app/build/outputs/apk/debug/*.apk
