name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build libv2ray.aar from submodule
        run: |
          cd AndroidLibXrayLite
          go mod download
          gomobile bind -v -androidapi 21 -ldflags="-w -s" -target=android ./
          mkdir -p ../V2rayNG/app/libs
          cp libv2ray.aar ../V2rayNG/app/libs/libv2ray.aar

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > truevpn.keystore

      - name: Build Release APK
        working-directory: V2rayNG
        run: |
          ./gradlew assemblePlaystoreRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/truevpn.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          ABI_FILTERS: "arm64-v8a;armeabi-v7a"

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: true-vpn-arm64
          path: V2rayNG/app/build/outputs/apk/playstore/release/*arm64*.apk

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: true-vpn-arm32
          path: V2rayNG/app/build/outputs/apk/playstore/release/*armeabi*.apk
