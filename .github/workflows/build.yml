name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download libv2ray
        run: |
          mkdir -p V2rayNG/app/libs
          wget -O V2rayNG/app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar

      - name: Build Debug APK
        working-directory: V2rayNG
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: true-vpn-debug
          path: V2rayNG/app/build/outputs/apk/debug/*.apk
